<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 Mary Roulette</title>
  <style>
    :root{
      --bg:#050505;
      --panel:rgba(0,0,0,.62);
      --panel2:rgba(18,18,18,.72);
      --line:rgba(255,255,255,.16);
      --text:#f5f5f5;
      --muted:#c9c9c9;
      --gold:#d4af37;
      --red:#b12020;
      --shadow:0 14px 40px rgba(0,0,0,.45);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      height:100%;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "Anton", sans-serif;
      color:var(--text);
      background:var(--bg);
      overflow:hidden;
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      isolation:isolate;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.18)),
        url("843C18FB-FCB2-41AF-BBD9-4F62E5C23C2B.png") center center / cover no-repeat;
      filter:contrast(1.08) brightness(1.08);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,.14) 0%, rgba(0,0,0,.40) 62%, rgba(0,0,0,.72) 100%);
      z-index:-1;
    }

    .app{
      width:min(1400px, 100%);
      height:min(920px, 100%);
      display:grid;
      grid-template-columns: 1.2fr .95fr;
      gap:20px;
      align-items:stretch;
    }

    .left, .right{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(4px);
    }

    .left{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:20px 20px 26px;
      position:relative;
      min-height:0;
    }

    .right{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:24px;
      min-height:0;
      background:var(--panel2);
    }

    .title{
      width:100%;
      text-align:center;
      font-size:clamp(34px, 4.2vw, 72px);
      letter-spacing:2px;
      line-height:1;
      color:#fff;
      text-transform:uppercase;
      text-shadow:
        0 0 2px rgba(0,0,0,.8),
        0 0 12px rgba(0,0,0,.5),
        0 3px 0 rgba(0,0,0,.6);
      margin:4px 0 12px;
    }

    .wheel-wrap{
      position:relative;
      width:min(92vw, 780px);
      aspect-ratio:1 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:6px;
    }

    .pointer{
      position:absolute;
      top:8px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:24px solid transparent;
      border-right:24px solid transparent;
      border-top:44px solid #fff;
      filter:drop-shadow(0 3px 0 rgba(0,0,0,.5)) drop-shadow(0 0 10px rgba(0,0,0,.45));
      z-index:10;
    }

    .pointer::after{
      content:"";
      position:absolute;
      left:-10px;
      top:-46px;
      width:20px;
      height:20px;
      border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 0 4px #fff, 0 3px 10px rgba(0,0,0,.45);
    }

    #wheelCanvas{
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.45));
      user-select:none;
      -webkit-user-select:none;
    }

    .ring-label{
      margin-top:10px;
      font-size:18px;
      letter-spacing:2px;
      opacity:.92;
      text-align:center;
      text-transform:uppercase;
      color:#efefef;
      text-shadow:0 2px 6px rgba(0,0,0,.45);
    }

    .status-top{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .label{
      font-size:14px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:var(--muted);
      opacity:.92;
    }

    .result-card{
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px 18px;
      background:rgba(255,255,255,.06);
      text-align:center;
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .result-workout{
      font-size:clamp(34px, 4vw, 62px);
      line-height:.95;
      letter-spacing:2px;
      text-transform:uppercase;
      text-wrap:balance;
      text-shadow:0 3px 10px rgba(0,0,0,.35);
    }

    .result-sub{
      margin-top:12px;
      font-size:clamp(18px, 1.7vw, 28px);
      letter-spacing:3px;
      color:var(--gold);
      text-transform:uppercase;
    }

    .timer-block{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-top:18px;
    }

    .timer-value{
      font-size:clamp(58px, 7vw, 116px);
      line-height:.9;
      letter-spacing:2px;
      text-align:center;
      color:#fff;
      text-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    .bar{
      width:100%;
      height:16px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .bar-fill{
      width:100%;
      height:100%;
      background:linear-gradient(90deg, #ffffff 0%, var(--gold) 100%);
      transform-origin:left center;
      transition:transform .2s linear;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }

    .btn, .toggle{
      border:none;
      outline:none;
      border-radius:16px;
      min-height:72px;
      font-size:22px;
      letter-spacing:1.5px;
      text-transform:uppercase;
      font-family:inherit;
      cursor:pointer;
      color:#111;
      background:#fff;
      box-shadow:0 8px 20px rgba(0,0,0,.25);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn:hover, .toggle:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 24px rgba(0,0,0,.3);
    }

    .btn:active, .toggle:active{
      transform:translateY(1px);
    }

    .btn.primary{
      background:var(--gold);
      color:#111;
      grid-column:1 / -1;
      min-height:82px;
      font-size:30px;
    }

    .toggle.active{
      background:#fff;
      color:#111;
    }

    .toggle.inactive{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }

    .footer-note{
      margin-top:14px;
      font-family:Arial, Helvetica, sans-serif;
      font-size:13px;
      letter-spacing:.4px;
      line-height:1.45;
      color:rgba(255,255,255,.8);
      text-align:center;
    }

    @media (max-width: 1100px){
      .app{
        grid-template-columns:1fr;
        height:auto;
      }

      body{
        overflow:auto;
      }

      .wheel-wrap{
        width:min(92vw, 700px);
      }
    }

    @media (max-width: 640px){
      .controls{
        grid-template-columns:1fr;
      }

      .title{
        font-size:clamp(28px, 8vw, 48px);
      }

      .pointer{
        top:2px;
        border-left:18px solid transparent;
        border-right:18px solid transparent;
        border-top:34px solid #fff;
      }

      .pointer::after{
        left:-8px;
        top:-36px;
        width:16px;
        height:16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="left">
      <div class="title">Iron Sharpens Iron</div>

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="900" height="900" aria-label="Roulette Wheel"></canvas>
      </div>

      <div class="ring-label">Mary Wheel • 40 Second Intervals</div>
    </section>

    <aside class="right">
      <div class="status-top">
        <div>
          <div class="label">Current Workout</div>
          <div class="result-card">
            <div class="result-workout" id="resultWorkout">Press Spin</div>
            <div class="result-sub" id="resultSub">40 Seconds</div>
          </div>
        </div>

        <div class="timer-block">
          <div class="label">Next Auto Spin</div>
          <div class="timer-value" id="timerValue">--</div>
          <div class="bar">
            <div class="bar-fill" id="barFill"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn primary" id="spinBtn">Spin</button>
          <button class="toggle active" id="autoToggle">Auto Spin: On</button>
          <button class="toggle active" id="voiceToggle">Voice: On</button>
        </div>
      </div>

      <div class="footer-note">
        First manual spin starts the 40-second cycle. After that, the wheel spins automatically every 40 seconds.
      </div>
    </aside>
  </div>

  <script>
  const workouts = [
    "Flutter Kicks",
    "American Hammers",
    "Heel Touches",
    "Big Boy Sit-Ups",
    "Freddy Mercuries",
    "Leg Raises",
    "Pickle Pounder",
    "Plank",
    "Side Plank Left",
    "Side Plank Right",
    "Dead Bug",
    "Superman"
  ];

  const sliceColors = [
    "#111111", "#8B0000", "#1f1f1f", "#B8860B",
    "#202020", "#A61B1B", "#141414", "#C89B2A",
    "#242424", "#951616", "#191919", "#D4AF37"
  ];

  const canvas = document.getElementById("wheelCanvas");
  const ctx = canvas.getContext("2d");

  const resultWorkout = document.getElementById("resultWorkout");
  const resultSub = document.getElementById("resultSub");
  const spinBtn = document.getElementById("spinBtn");
  const autoToggle = document.getElementById("autoToggle");
  const voiceToggle = document.getElementById("voiceToggle");
  const timerValue = document.getElementById("timerValue");
  const barFill = document.getElementById("barFill");

  const TWO_PI = Math.PI * 2;
  const SLICE_COUNT = workouts.length;
  const SLICE_ANGLE = TWO_PI / SLICE_COUNT;
  const COUNTDOWN_SECONDS = 40;

  let rotation = 0;
  let isSpinning = false;
  let highlightedIndex = null;
  let countdown = COUNTDOWN_SECONDS;
  let timerInterval = null;
  let autoEnabled = true;
  let voiceEnabled = true;
  let cycleStarted = false;
  let speechUnlocked = false;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * ratio);
    canvas.height = Math.floor(rect.height * ratio);
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    drawWheel();
  }

  function fitText(text, maxWidth, startSize) {
    let size = startSize;
    ctx.font = `900 ${size}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
    while (size > 12 && ctx.measureText(text).width > maxWidth) {
      size -= 1;
      ctx.font = `900 ${size}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
    }
    return size;
  }

  function wrapArcText(text, maxWidth, fontSize) {
    const words = text.split(" ");
    const lines = [];
    let line = "";

    for (const word of words) {
      const test = line ? `${line} ${word}` : word;
      if (ctx.measureText(test).width <= maxWidth) {
        line = test;
      } else {
        if (line) lines.push(line);
        line = word;
      }
    }
    if (line) lines.push(line);

    const lineHeight = fontSize * 0.95;
    const totalHeight = (lines.length - 1) * lineHeight;

    lines.forEach((ln, idx) => {
      const y = idx * lineHeight - totalHeight / 2;
      ctx.strokeText(ln, 0, y);
      ctx.fillText(ln, 0, y);
    });
  }

  function drawWheel() {
    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    ctx.clearRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(w, h) * 0.47;
    const innerHub = radius * 0.16;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    for (let i = 0; i < SLICE_COUNT; i++) {
      const start = -Math.PI / 2 + i * SLICE_ANGLE;
      const end = start + SLICE_ANGLE;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, radius, start, end);
      ctx.closePath();

      ctx.fillStyle = sliceColors[i % sliceColors.length];
      ctx.fill();

      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.stroke();

      if (i === highlightedIndex) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fill();
        ctx.restore();
      }

      const mid = start + SLICE_ANGLE / 2;
      const textRadius = radius * 0.70;
      const text = workouts[i].toUpperCase();

      ctx.save();
      ctx.translate(Math.cos(mid) * textRadius, Math.sin(mid) * textRadius);
      ctx.rotate(mid + Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const maxWidth = radius * 0.33;
      const fontSize = fitText(text, maxWidth, 28);
      ctx.font = `900 ${fontSize}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
      ctx.lineWidth = 5;
      ctx.strokeStyle = "rgba(0,0,0,0.75)";
      ctx.fillStyle = "#ffffff";

      wrapArcText(text, maxWidth, fontSize);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(0, 0, radius + 2, 0, TWO_PI);
    ctx.lineWidth = 8;
    ctx.strokeStyle = "#ffffff";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, radius - 18, 0, TWO_PI);
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(255,255,255,0.65)";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, innerHub + 18, 0, TWO_PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, innerHub + 8, 0, TWO_PI);
    ctx.fillStyle = "#111111";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, innerHub, 0, TWO_PI);
    ctx.fillStyle = "#d4af37";
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `900 ${Math.max(18, innerHub * 0.38)}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
    ctx.fillText("F3", 0, -innerHub * 0.14);
    ctx.font = `900 ${Math.max(12, innerHub * 0.18)}px Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif`;
    ctx.fillText("MARY", 0, innerHub * 0.24);

    ctx.restore();
  }

  function normalizeAngle(a) {
    a = a % TWO_PI;
    if (a < 0) a += TWO_PI;
    return a;
  }

  // FIXED: account for slice centers, not slice edges
  function getWinningIndex(rot = rotation) {
    const pointerAngle = -Math.PI / 2;
    const relative = normalizeAngle(pointerAngle - rot + SLICE_ANGLE / 2);
    return Math.floor(relative / SLICE_ANGLE) % SLICE_COUNT;
  }

  function updateResult(index) {
    highlightedIndex = index;
    resultWorkout.textContent = workouts[index];
    resultSub.textContent = "40 Seconds";
    drawWheel();
  }

  async function unlockSpeech() {
    if (!("speechSynthesis" in window)) return false;

    try {
      window.speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(" ");
      u.volume = 0;
      u.rate = 1;
      u.pitch = 1;

      await new Promise((resolve) => {
        u.onend = resolve;
        u.onerror = resolve;
        window.speechSynthesis.speak(u);
        setTimeout(resolve, 250);
      });

      speechUnlocked = true;
      return true;
    } catch (e) {
      return false;
    }
  }

  function speak(text) {
    if (!voiceEnabled || !speechUnlocked || !("speechSynthesis" in window)) return;

    try {
      window.speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.92;
      utter.pitch = 0.9;
      utter.volume = 1;

      const voices = window.speechSynthesis.getVoices();
      const preferred =
        voices.find(v => /Samantha|Karen|Moira|Daniel|Alex/i.test(v.name)) ||
        voices.find(v => /en-US|en_US/i.test(v.lang)) ||
        voices[0];

      if (preferred) utter.voice = preferred;
      window.speechSynthesis.speak(utter);
    } catch (e) {
      console.log("Speech failed:", e);
    }
  }

  function updateTimerUI() {
    timerValue.textContent = cycleStarted ? `${countdown}` : "--";
    const pct = cycleStarted ? Math.max(0, Math.min(1, countdown / COUNTDOWN_SECONDS)) : 1;
    barFill.style.transform = `scaleX(${pct})`;
  }

  function stopCountdown() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function startCountdown() {
    if (!cycleStarted) return;
    stopCountdown();
    countdown = COUNTDOWN_SECONDS;
    updateTimerUI();

    timerInterval = setInterval(() => {
      if (isSpinning) return;

      countdown -= 1;
      updateTimerUI();

      if (countdown <= 0) {
        stopCountdown();
        countdown = 0;
        updateTimerUI();

        if (autoEnabled && !isSpinning) {
          spinWheel(true);
        } else {
          startCountdown();
        }
      }
    }, 1000);
  }

  function animateSpin(startRotation, finalRotation, duration, onDone) {
    const startTime = performance.now();

    function frame(now) {
      const elapsed = now - startTime;
      const t = Math.min(1, elapsed / duration);
      const eased = 1 - Math.pow(1 - t, 4);
      rotation = startRotation + (finalRotation - startRotation) * eased;
      drawWheel();

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        rotation = finalRotation;
        drawWheel();
        onDone?.();
      }
    }

    requestAnimationFrame(frame);
  }

  function chooseTargetIndexAvoidCurrent() {
    const currentIndex = getWinningIndex(rotation);
    let targetIndex = Math.floor(Math.random() * SLICE_COUNT);
    if (targetIndex === currentIndex) {
      targetIndex = (targetIndex + 1) % SLICE_COUNT;
    }
    return targetIndex;
  }

  function computeFinalRotationForIndex(targetIndex) {
    const pointerAngle = -Math.PI / 2;
    const sliceCenter = -Math.PI / 2 + (targetIndex * SLICE_ANGLE) + (SLICE_ANGLE / 2);
    const desiredRotation = pointerAngle - sliceCenter;

    const currentNorm = normalizeAngle(rotation);
    const targetNorm = normalizeAngle(desiredRotation);

    let delta = targetNorm - currentNorm;
    if (delta < 0) delta += TWO_PI;

    const extraSpins = 7 + Math.floor(Math.random() * 3);
    return rotation + extraSpins * TWO_PI + delta;
  }

  function spinWheel(auto = false) {
    if (isSpinning) return;

    isSpinning = true;
    stopCountdown();
    highlightedIndex = null;
    drawWheel();

    const targetIndex = chooseTargetIndexAvoidCurrent();
    const finalRotation = computeFinalRotationForIndex(targetIndex);
    const duration = 5200 + Math.random() * 900;

    animateSpin(rotation, finalRotation, duration, () => {
      // use the target directly so display always matches the intended landing
      updateResult(targetIndex);

      // optional sanity check in console
      const detected = getWinningIndex(rotation);
      console.log("Target:", targetIndex, workouts[targetIndex], "| Detected:", detected, workouts[detected]);

      speak(`${workouts[targetIndex]}. Forty seconds.`);

      isSpinning = false;

      if (!cycleStarted) {
        cycleStarted = true;
      }

      startCountdown();
    });
  }

  spinBtn.addEventListener("click", async () => {
    if (!speechUnlocked) {
      await unlockSpeech();
    }
    spinWheel(false);
  });

  autoToggle.addEventListener("click", () => {
    autoEnabled = !autoEnabled;
    autoToggle.textContent = `Auto Spin: ${autoEnabled ? "On" : "Off"}`;
    autoToggle.classList.toggle("active", autoEnabled);
    autoToggle.classList.toggle("inactive", !autoEnabled);

    if (cycleStarted && !isSpinning) {
      startCountdown();
    }
  });

  voiceToggle.addEventListener("click", async () => {
    voiceEnabled = !voiceEnabled;
    voiceToggle.textContent = `Voice: ${voiceEnabled ? "On" : "Off"}`;
    voiceToggle.classList.toggle("active", voiceEnabled);
    voiceToggle.classList.toggle("inactive", !voiceEnabled);

    if (voiceEnabled && !speechUnlocked) {
      await unlockSpeech();
    }

    if (!voiceEnabled && "speechSynthesis" in window) {
      window.speechSynthesis.cancel();
    }
  });

  window.addEventListener("resize", resizeCanvas);

  if ("speechSynthesis" in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };
  }

  resizeCanvas();
  updateTimerUI();
  resultWorkout.textContent = "Press Spin";
  resultSub.textContent = "40 Seconds";
  highlightedIndex = null;
  drawWheel();
</script>
</body>
</html>
